<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
	<title>deadair</title>
	<defs>
		<radialGradient id="scr" cx="50%" cy="38%" r="75%">
			<stop offset="0%" stop-color="#16161b" />
			<stop offset="100%" stop-color="#050506" />
		</radialGradient>
		<linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#f2f2f4" />
			<stop offset="52%" stop-color="#b8b8be" />
			<stop offset="53%" stop-color="#7c7c84" />
			<stop offset="100%" stop-color="#d2d2d8" />
		</linearGradient>
	</defs>
	<rect width="64" height="64" rx="12" fill="url(#scr)" />
	<rect x="0.5" y="0.5" width="63" height="63" rx="11.5" fill="none" stroke="#26262c" />
	<!-- faint scanlines -->
	<g fill="#ffffff" opacity="0.04">
		<rect x="6" y="14" width="52" height="1" />
		<rect x="6" y="22" width="52" height="1" />
		<rect x="6" y="30" width="52" height="1" />
		<rect x="6" y="38" width="52" height="1" />
		<rect x="6" y="46" width="52" height="1" />
	</g>
	<!-- chrome play triangle -->
	<path d="M26 21 L45 32 L26 43 Z" fill="url(#chrome)" stroke="#000" stroke-width="1.2" stroke-linejoin="round" />
	<!-- live dot -->
	<circle cx="50" cy="15" r="4.5" fill="#cf4a42" />
	<circle cx="50" cy="15" r="4.5" fill="#cf4a42" opacity="0.5" />
</svg>
